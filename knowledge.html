            "publisher": {

            },
            "articleBody": "개인회생은 일정 기간 동안 법원이 정한 변제금을 납부한 뒤 남은 채무의 면책을 구하는 절차입니다. 그래서 신청 전에는 단순히 채무 금액만 보지 않고, 앞으로 반복적으로 소득이 발생할 수 있는지부터 확인합니다.\n\n급여소득자는 재직 여부, 급여명세, 최근 입금 내역을 중심으로 보고, 자영업자나 프리랜서는 매출과 비용, 실제 생활비 흐름을 함께 봅니다. 소득이 들쑥날쑥하다면 평균 산정 방식과 증빙 가능성이 중요합니다.\n\n매월 사용할 수 있는 금액에서 최저생계비와 필수 지출을 제외했을 때 변제에 투입할 수 있는 금액이 어느 정도인지 정리하면 상담 방향을 빠르게 잡을 수 있습니다.\n\n상담 시에는 최근 소득자료, 채무내역, 부양가족 정보, 월 고정지출을 함께 준비하면 개인회생 가능성과 예상 변제금 검토가 더 정확해집니다."
          }
        },

            },
            "articleBody": "개인파산 상담에서는 파산 선고 가능성만 확인해서는 부족합니다. 실제로 의뢰인에게 중요한 결과는 남은 채무 책임을 면제받을 수 있는지, 즉 면책 가능성입니다.\n\n법원은 채무가 생긴 원인, 최근 재산 처분, 특정 채권자에게만 갚은 내역, 도박이나 과도한 투기성 지출 여부 등을 종합적으로 봅니다. 이런 사정은 면책 단계에서 중요한 쟁점이 될 수 있습니다.\n\n재산이 거의 없고 소득으로 변제를 이어가기 어렵더라도, 면책 불허가 사유가 의심되는 자료가 있으면 사전에 설명과 증빙 방향을 준비해야 합니다.\n\n상담 전에는 채무 발생 시기, 최근 1~2년간 큰 거래, 보유 재산, 소득 가능성, 가족 명의 거래 여부를 정리해 두면 파산과 면책을 함께 판단하기 쉽습니다."
          }
        },

            "publisher": {

            },
            "articleBody": "자영업자 채무는 생활비 채무와 사업 운영 과정에서 생긴 채무가 섞여 있는 경우가 많습니다. 폐업했더라도 사업자 대출, 카드매출 정산, 보증채무, 미납 세금이 남아 있을 수 있습니다.\n\n상담에서는 폐업 여부, 사업자등록 상태, 매출 흐름, 재고나 보증금 등 남은 재산을 함께 확인합니다. 단순히 현재 수입이 없다는 사정만으로 절차가 결정되지는 않습니다.\n\n소득이 새로 발생할 가능성이 있으면 개인회생을 검토할 수 있고, 현실적으로 변제가 어렵다면 개인파산과 면책 가능성을 함께 봐야 합니다.\n\n폐업사실증명, 부가세 신고자료, 통장 거래내역, 임대차계약서, 카드매출 내역을 준비하면 사업 관련 채무의 성격을 빠르게 구분할 수 있습니다."
          }

            "articleBody": "급여압류와 통장압류가 걱정될 때는 채권자의 전화나 문자만 보고 판단하지 말고 법원 사건 진행 여부부터 확인해야 합니다. 실제 압류명령이 내려졌는지, 아직 추심 단계인지에 따라 대응 순서가 달라집니다.\n\n통장압류는 압류된 금융기관과 계좌 제한 여부를 확인하고, 급여압류는 회사에 송달되었는지와 급여 지급일을 함께 봅니다. 이미 송달된 경우에는 생활비 확보와 절차 선택을 동시에 검토해야 합니다.\n\n개인회생을 준비하는 경우 금지명령이나 중지명령 가능성이 중요한 쟁점이 됩니다. 다만 모든 사건에서 자동으로 인용되는 것은 아니므로 채무 발생 경위와 소득자료가 함께 정리되어야 합니다.\n\n상담 전에는 법원 우편물, 압류 안내 문자, 은행 앱 제한 화면, 급여명세서, 채권자명과 사건번호를 준비하면 현재 단계와 가능한 조치를 빠르게 판단할 수 있습니다."
