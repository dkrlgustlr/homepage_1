<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>상담신청 | 법무사 권선기 사무소</title>
  <meta name="description" content="법무사 권선기 사무소 개인회생, 개인파산, 면책, 압류·추심 대응 상담 신청 페이지입니다.">
  <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large">
  <link rel="canonical" href="https://dkrlgustlr.github.io/homepage_1/consult.html">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="ko_KR">
  <meta property="og:site_name" content="법무사 권선기 사무소">
  <meta property="og:title" content="상담신청 | 법무사 권선기 사무소">
  <meta property="og:description" content="비공개 상담으로 현재 채무 상황을 먼저 확인합니다.">
  <meta property="og:url" content="https://dkrlgustlr.github.io/homepage_1/consult.html">
  <meta property="og:image" content="https://dkrlgustlr.github.io/homepage_1/mockup_assets/beommusa_office_photo_v2.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page">
    <div data-include="header"></div>
    <main class="subpage">
      <section class="sub-hero">
        <div class="sub-hero-inner">
          <div class="sub-kicker">PRIVATE CONSULTATION</div>
          <h1>현재 상황을 먼저 확인하고<br>필요한 절차를 안내합니다.</h1>
          <p>접수된 내용은 상담을 위한 확인 목적으로만 사용되며, 담당자가 순차적으로 연락드립니다.</p>
        </div>
      </section>

      <section class="sub-content">
        <div class="sub-section sub-consult-layout">
          <aside class="sub-consult-panel">
            <h2>상담 진행</h2>
            <p>채무·소득·재산 현황 확인, 개인회생 또는 파산 가능성 검토, 서류 준비와 법원 제출 일정 안내, 금지명령·압류·추심 대응 방향을 순서대로 정리합니다.</p>
          </aside>
          <form class="sub-consult-form">
            <label class="sub-form-row">
              <span>상담 분야</span>
              <select name="case_type" aria-label="상담 분야">
                <option>개인회생 / 개인파산 / 압류대응</option>
                <option>개인회생</option>
                <option>개인파산</option>
                <option>압류·추심 대응</option>
                <option>보정권고 대응</option>
              </select>
            </label>
            <label class="sub-form-row">
              <span>이름</span>
              <input type="text" name="name" autocomplete="name" placeholder="성함을 입력해주세요">
            </label>
            <label class="sub-form-row">
              <span>전화번호</span>
              <input type="tel" name="phone" autocomplete="tel" placeholder="연락 가능한 번호">
            </label>
            <label class="sub-form-row">
              <span>지역</span>
              <input type="text" name="area" autocomplete="address-level2" placeholder="화성 · 반월동 · 동탄">
            </label>
            <label class="sub-form-row area">
              <span>문의내용</span>
              <textarea name="message" placeholder="채무 상황과 압류 여부를 간단히 적어주세요"></textarea>
            </label>
            <button class="sub-submit" type="button">상담 신청</button>
            <p class="sub-note">현재 목업 단계에서는 입력 내용이 전송되지 않습니다. 실제 운영 단계에서 문자 알림 또는 게시판 시스템과 연결할 수 있습니다.</p>
          </form>
        </div>
      </section>
      <div data-include="footer"></div>
    </main>
  </div>
  <script src="layout.js"></script>
</body>
</html>
